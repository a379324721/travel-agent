<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>travel-agent 差旅助手</title>
<style>
  :root {
    --bg: #f4f6f9; --panel: #ffffff; --line: #e3e8ef;
    --text: #1c2430; --muted: #6b7686;
    --accent: #1a6feb; --accent-soft: #e8f1fe;
    --chip-bg: #f0f4fa; --chip-text: #40506a;
    --user-bubble: #1a6feb; --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.65 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header h1 .logo { color: var(--accent); margin-right: 6px; }
  header .spacer { flex: 1; }
  header label { color: var(--muted); font-size: 13px; }
  select, button.ghost {
    border: 1px solid var(--line); background: var(--panel); color: var(--text);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  #chat { flex: 1; overflow-y: auto; padding: 20px 0 8px; }
  .inner { max-width: 760px; margin: 0 auto; padding: 0 16px; }
  .msg { display: flex; margin: 10px 0; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 82%; padding: 10px 14px; border-radius: var(--radius);
    white-space: pre-wrap; word-break: break-word;
  }
  .user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
  .assistant .bubble {
    background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px;
  }
  .chips { margin: 4px 0 2px; display: flex; flex-direction: column; gap: 6px; }
  .chip {
    align-self: flex-start; background: var(--chip-bg); color: var(--chip-text);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 12px; font-size: 12.5px;
  }
  .chip .name { font-weight: 600; }
  .chip .args { color: var(--muted); }
  .error { color: #c0392b; }
  .typing::after { content: "▍"; animation: blink 1s infinite; color: var(--muted); }
  @keyframes blink { 50% { opacity: 0; } }
  .suggest { display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 0 10px; }
  .suggest button {
    border: 1px solid var(--line); background: var(--panel); color: var(--chip-text);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  .suggest button:hover { border-color: var(--accent); color: var(--accent); }
  footer {
    background: var(--panel); border-top: 1px solid var(--line); padding: 12px 0 14px;
  }
  .inputrow { display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; font: inherit; height: 46px; outline: none; background: var(--bg);
  }
  textarea:focus { border-color: var(--accent); background: var(--panel); }
  #send {
    border: 0; background: var(--accent); color: #fff; border-radius: 10px;
    padding: 0 22px; font-size: 15px; cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: not-allowed; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<header>
  <h1><span class="logo">✈</span>travel-agent 差旅助手</h1>
  <div class="spacer"></div>
  <label>当前用户
    <select id="user">
      <option value="E001" selected>王宁 · 经理（E001）</option>
      <option value="E002">李雷 · 员工（E002）</option>
      <option value="E003">韩梅 · 总监（E003）</option>
      <option value="">匿名（不带身份）</option>
    </select>
  </label>
  <button class="ghost" id="newSession">新会话</button>
</header>

<div id="chat"><div class="inner" id="messages">
  <div class="suggest" id="suggest">
    <button>下周三从北京去上海出差两天，帮我规划行程并看差标</button>
    <button>出差住宿的差标是多少？</button>
    <button>帮我查下周五北京到上海的机票</button>
    <button>行程结束，一键提交报销</button>
  </div>
</div></div>

<footer><div class="inner">
  <div class="inputrow">
    <textarea id="input" placeholder="描述你的差旅需求，Enter 发送，Shift+Enter 换行"></textarea>
    <button id="send">发送</button>
  </div>
  <div class="meta">会话 <span id="sid"></span> · 订票/审批/报销为模拟系统 · 金额与政策以公司制度为准</div>
</div></footer>

<script>
const TOOL_LABELS = {
  plan_travel_itinerary: "生成行程草稿",
  check_travel_policy: "差标校验",
  search_travel_policy_docs: "检索制度文档",
  search_flights: "搜索航班",
  search_hotels: "搜索酒店",
  search_trains: "搜索车次",
  create_booking: "创建预订",
  submit_travel_approval: "提交出差审批",
  check_approval: "查询审批状态",
  submit_expense_report: "一键提交报销",
};

const messagesEl = document.getElementById("messages");
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendEl = document.getElementById("send");
const userEl = document.getElementById("user");
const sidEl = document.getElementById("sid");

let sessionId = newId();
let busy = false;
sidEl.textContent = sessionId.slice(0, 8);

function newId() {
  return (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
}

function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

function addMsg(role, text) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  wrap.appendChild(b);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return b;
}

function addChip(container, toolName, args) {
  const chip = document.createElement("div");
  chip.className = "chip";
  const label = TOOL_LABELS[toolName] || toolName;
  let argsText = "";
  try {
    const parts = [];
    for (const [k, v] of Object.entries(args || {})) {
      if (typeof v === "string" || typeof v === "number") parts.push(v);
    }
    argsText = parts.slice(0, 4).join(" · ");
  } catch (e) { /* ignore */ }
  chip.innerHTML = `⚙️ <span class="name"></span> <span class="args"></span>`;
  chip.querySelector(".name").textContent = label;
  chip.querySelector(".args").textContent = argsText;
  container.appendChild(chip);
  scrollBottom();
}

async function send(text) {
  text = (text || inputEl.value).trim();
  if (!text || busy) return;
  busy = true; sendEl.disabled = true; inputEl.value = "";

  addMsg("user", text);
  const wrap = document.createElement("div");
  wrap.className = "msg assistant";
  const col = document.createElement("div");
  col.style.maxWidth = "82%";
  const chips = document.createElement("div");
  chips.className = "chips";
  const bubble = document.createElement("div");
  bubble.className = "bubble typing";
  bubble.textContent = "";
  col.appendChild(chips); col.appendChild(bubble); wrap.appendChild(col);
  messagesEl.appendChild(wrap);
  scrollBottom();

  try {
    const resp = await fetch("/api/v1/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "user", content: text }],
        stream: true,
        session_id: sessionId,
        user_id: userEl.value || null,
      }),
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status + " " + (await resp.text()));

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let i;
      while ((i = buf.indexOf("\n\n")) >= 0) {
        const line = buf.slice(0, i).trim();
        buf = buf.slice(i + 2);
        if (!line.startsWith("data:")) continue;
        const chunk = JSON.parse(line.slice(5));
        if (chunk.type === "content" && chunk.delta) {
          bubble.textContent += chunk.delta;
          scrollBottom();
        } else if (chunk.type === "tool_call") {
          addChip(chips, chunk.tool_name, chunk.tool_args);
        } else if (chunk.type === "error") {
          bubble.classList.add("error");
          bubble.textContent += "\n[出错] " + chunk.error;
        }
      }
    }
    if (!bubble.textContent) bubble.textContent = "（无内容）";
  } catch (e) {
    bubble.classList.add("error");
    bubble.textContent = "请求失败：" + e.message;
  } finally {
    bubble.classList.remove("typing");
    busy = false; sendEl.disabled = false;
    inputEl.focus();
    scrollBottom();
  }
}

sendEl.addEventListener("click", () => send());
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById("suggest").addEventListener("click", (e) => {
  if (e.target.tagName === "BUTTON") send(e.target.textContent);
});
document.getElementById("newSession").addEventListener("click", () => {
  sessionId = newId();
  sidEl.textContent = sessionId.slice(0, 8);
  messagesEl.querySelectorAll(".msg").forEach((m) => m.remove());
  inputEl.focus();
});
userEl.addEventListener("change", () => {
  addMsg("assistant", "已切换身份，建议点「新会话」重新开始，避免历史串话。");
});
inputEl.focus();
</script>
</body>
</html>
